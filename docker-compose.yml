services:
  api:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    container_name: support-copilot-api
    restart: unless-stopped
    ports:
      - "80:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
